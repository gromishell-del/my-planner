<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a0a0a">
    <title>Планировщик Pro</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1e1e1e;
            --border: #2a2a2a; --border-light: #333333;
            --text-primary: #ffffff; --text-secondary: #a0a0a0; --text-muted: #666666;
            --accent: #ffffff; --accent-dim: rgba(255,255,255,0.1);
            --danger: #ff4444; --success: #44ff88; --warning: #ffaa44; --info: #44aaff;
            --shadow: 0 8px 32px rgba(0,0,0,0.4); --radius: 12px; --radius-sm: 8px; --radius-lg: 16px;
            --transition: 0.2s ease;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --header-h: 60px; --nav-h: 64px;
            /* Group Colors */
            --group-work: #3b82f6; --group-home: #22c55e; --group-study: #a855f7; --group-personal: #f59e0b; --group-other: #6b7280;
        }
        [data-theme="light"] {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-tertiary: #f1f3f5;
            --border: #dee2e6; --border-light: #ced4da;
            --text-primary: #212529; --text-secondary: #495057; --text-muted: #868e96;
            --accent: #212529; --accent-dim: rgba(33,37,41,0.1);
            --danger: #dc3545; --success: #28a745; --warning: #fd7e14; --info: #007bff;
        }
        [data-theme="blue"] {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155;
            --border: #334155; --border-light: #475569;
            --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #94a3b8;
            --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.15);
        }
        [data-theme="purple"] {
            --bg-primary: #1a1025; --bg-secondary: #251a35; --bg-tertiary: #352545;
            --border: #4a3a65; --border-light: #5a4a75;
            --text-primary: #f5f0ff; --text-secondary: #d5c5e5; --text-muted: #a595b5;
            --accent: #a855f7; --accent-dim: rgba(168,85,247,0.15);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; transition: background var(--transition), color var(--transition); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .header { position: sticky; top: 0; z-index: 100; height: var(--header-h); background: rgba(10,10,10,0.9); backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 12px; }
        [data-theme="light"] .header { background: rgba(248,249,250,0.9); }
        .header-inner { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
        .logo { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 16px; }
        .logo-icon { width: 32px; height: 32px; background: var(--text-primary); color: var(--bg-primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .nav-controls { display: flex; align-items: center; gap: 4px; }
        .nav-btn, .today-btn, .btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-family: inherit; min-width: 40px; min-height: 40px; font-size: 14px; }
        .nav-btn { width: 36px; height: 36px; font-size: 18px; }
        .today-btn { padding: 0 12px; font-weight: 600; }
        .current-month { font-size: 15px; font-weight: 600; text-align: center; min-width: 130px; }
        .header-actions { display: flex; align-items: center; gap: 4px; }
        .btn { padding: 0 8px; font-size: 12px; }
        .btn span:first-child { margin-right: 4px; }

        .main { max-width: 1400px; margin: 0 auto; padding: 10px; display: grid; grid-template-columns: 1fr 360px; gap: 10px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 10px); }
        .calendar-section { animation: fadeIn 0.3s ease both; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
        .weekday { text-align: center; padding: 6px 0; font-size: 10px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .calendar-day { aspect-ratio: 1; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 4px; display: flex; flex-direction: column; position: relative; min-height: 55px; cursor: pointer; }
        .calendar-day:active { transform: scale(0.96); background: var(--bg-tertiary); }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-day.today { border-color: var(--accent); background: var(--accent-dim); }
        .calendar-day.today .day-num { background: var(--accent); color: var(--bg-primary); }
        .calendar-day.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
        .day-num { font-size: 12px; font-weight: 600; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .day-tasks { flex: 1; margin-top: 2px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
        .day-task-preview { font-size: 8px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 1px 2px; background: var(--accent-dim); border-radius: 2px; }
        .day-task-preview.completed { text-decoration: line-through; opacity: 0.5; }
        .task-badge { position: absolute; top: 3px; right: 3px; width: 14px; height: 14px; background: var(--accent); color: var(--bg-primary); border-radius: 50%; font-size: 8px; font-weight: 700; display: flex; align-items: center; justify-content: center; }

        .sidebar { display: flex; flex-direction: column; gap: 10px; animation: fadeIn 0.4s ease both; }
        .card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; }
        .tabs { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: 8px; padding: 2px; margin-bottom: 8px; overflow-x: auto; }
        .tab { flex: 1; padding: 8px 4px; text-align: center; font-size: 11px; font-weight: 600; color: var(--text-secondary); border-radius: 6px; border: none; background: none; cursor: pointer; white-space: nowrap; min-width: 60px; }
        .tab.active { background: var(--bg-active); color: var(--text-primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.2s ease; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin-bottom: 6px; }
        .stat { text-align: center; padding: 6px 4px; background: var(--bg-tertiary); border-radius: 6px; border: 1px solid var(--border); }
        .stat-val { font-size: 16px; font-weight: 800; }
        .stat-lbl { font-size: 8px; color: var(--text-muted); text-transform: uppercase; margin-top: 2px; }
        .progress { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 6px; }
        .progress-fill { height: 100%; background: var(--success); transition: width 0.3s; }

        .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 8px 0; }
        .detail-stat { padding: 8px; background: var(--bg-tertiary); border-radius: 6px; border: 1px solid var(--border); }
        .detail-stat-val { font-size: 16px; font-weight: 700; }
        .detail-stat-lbl { font-size: 9px; color: var(--text-muted); }
        .detail-stat.hl { border-color: var(--accent); }
        .detail-stat.hl .detail-stat-val { color: var(--accent); }

        .week-row { display: flex; align-items: center; gap: 8px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 12px; }
        .week-row:last-child { border-bottom: none; }
        .week-label { min-width: 60px; font-weight: 600; color: var(--text-secondary); }
        .week-info { flex: 1; color: var(--text-muted); }
        .week-bar { width: 40px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .week-bar-fill { height: 100%; background: var(--success); }

        .add-btn { width: 100%; padding: 12px; background: var(--bg-tertiary); border: 1px dashed var(--border-light); border-radius: 8px; color: var(--text-secondary); font-family: inherit; font-size: 14px; cursor: pointer; margin: 6px 0; min-height: 44px; }
        .add-btn:active { background: var(--bg-hover); color: var(--text-primary); }

        .task-list { display: flex; flex-direction: column; gap: 4px; max-height: 220px; overflow-y: auto; }
        .task-item { display: flex; align-items: flex-start; gap: 8px; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; animation: fadeIn 0.2s ease both; }
        .task-item:active { background: var(--bg-hover); }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-muted); }
        .task-item.priority-high { border-left: 3px solid var(--danger); }
        .task-item.priority-med { border-left: 3px solid var(--warning); }
        .task-item.priority-low { border-left: 3px solid var(--success); }
        .task-check { width: 20px; height: 20px; border: 2px solid var(--border-light); border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; margin-top: 1px; cursor: pointer; }
        .task-check.checked { background: var(--accent); border-color: var(--accent); }
        .task-check.checked::after { content: '✓'; color: var(--bg-primary); font-size: 11px; font-weight: 700; }
        .task-content { flex: 1; min-width: 0; }
        .task-text { font-size: 13px; font-weight: 500; line-height: 1.3; }
        .task-meta { font-size: 10px; color: var(--text-muted); margin-top: 2px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .group-badge { padding: 1px 5px; border-radius: 4px; font-size: 9px; font-weight: 700; color: #fff; text-transform: uppercase; }
        .group-work { background: var(--group-work); } .group-home { background: var(--group-home); }
        .group-study { background: var(--group-study); } .group-personal { background: var(--group-personal); }
        .group-other { background: var(--group-other); }

        .task-actions { display: flex; gap: 4px; }
        .task-btn { width: 30px; height: 30px; border: none; background: transparent; color: var(--text-muted); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; cursor: pointer; }
        .task-btn:active { background: var(--bg-active); color: var(--text-primary); }
        .task-btn.del:active { color: var(--danger); }

        .empty { text-align: center; padding: 16px 10px; color: var(--text-muted); font-size: 13px; }
        .filter-group { display: flex; gap: 4px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 8px; }
        .filter-chip { padding: 4px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 12px; font-size: 11px; color: var(--text-secondary); white-space: nowrap; cursor: pointer; }
        .filter-chip.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

        .search-bar { display: flex; gap: 6px; margin-bottom: 8px; }
        .search-input { flex: 1; padding: 8px 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 13px; min-height: 38px; }
        .filter-btn { padding: 0 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-secondary); font-size: 12px; cursor: pointer; }
        .filter-btn.active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: var(--transition); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; width: 94%; max-width: 460px; max-height: 90vh; overflow-y: auto; transform: scale(0.95); transition: var(--transition); }
        .modal-overlay.active .modal { transform: scale(1); }
        .modal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close { width: 36px; height: 36px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; }

        .form-group { margin-bottom: 10px; }
        .form-label { display: block; font-size: 11px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 10px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; min-height: 42px; }
        .form-textarea { resize: vertical; min-height: 60px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .date-input { width: 100%; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: var(--text-primary); font-size: 14px; }
        .repeat-opt { display: flex; align-items: center; gap: 8px; padding: 6px 0; font-size: 13px; }
        .form-actions { display: flex; gap: 8px; margin-top: 14px; }
        .form-actions .btn { flex: 1; justify-content: center; padding: 12px; min-height: 46px; font-size: 14px; font-weight: 600; }
        .btn-pri { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); }

        .mobile-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; height: var(--nav-h); background: var(--bg-secondary); border-top: 1px solid var(--border); z-index: 150; padding-bottom: var(--safe-bottom); }
        .mobile-nav-inner { display: flex; height: 100%; }
        .mobile-nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; color: var(--text-muted); font-size: 10px; border: none; background: none; font-family: inherit; position: relative; }
        .mobile-nav-item.active { color: var(--accent); }
        .mobile-nav-item.active::before { content: ''; position: absolute; top: 0; left: 25%; right: 25%; height: 2px; background: var(--accent); border-radius: 2px; }
        .nav-icon { font-size: 20px; }

        .toast-box { position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom) + 12px); left: 12px; right: 12px; z-index: 2000; display: flex; flex-direction: column; gap: 6px; pointer-events: none; }
        .toast { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow); animation: fadeIn 0.3s ease; pointer-events: auto; display: flex; align-items: center; gap: 8px; }
        .toast.success { border-left: 3px solid var(--success); } .toast.error { border-left: 3px solid var(--danger); } .toast.warning { border-left: 3px solid var(--warning); }
        .toast.hiding { animation: fadeIn 0.3s ease reverse forwards; }

        .dropdown { position: relative; }
        .dropdown-menu { position: absolute; top: calc(100% + 6px); right: 0; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; padding: 4px; min-width: 150px; box-shadow: var(--shadow); opacity: 0; visibility: hidden; transform: translateY(-5px); transition: var(--transition); z-index: 200; }
        .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { display: flex; align-items: center; gap: 8px; padding: 10px; border: none; background: none; color: var(--text-primary); font-family: inherit; font-size: 13px; border-radius: 6px; width: 100%; text-align: left; cursor: pointer; }
        .dropdown-item:active { background: var(--bg-hover); }

        @media (max-width: 768px) {
            .mobile-nav { display: block; }
            .main { grid-template-columns: 1fr; padding: 8px; padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 8px); }
            .header { height: 54px; padding: 0 8px; }
            .logo span { display: none; }
            .current-month { font-size: 13px; min-width: 100px; }
            .btn span:first-child { display: none; }
            .calendar-day { min-height: 44px; }
            .day-num { width: 20px; height: 20px; font-size: 11px; }
            .day-task-preview { display: none; }
            .task-badge { width: 12px; height: 12px; font-size: 7px; top: 2px; right: 2px; }
            .sidebar { gap: 8px; }
            .card { padding: 10px; }
            .tabs { margin-bottom: 6px; }
            .tab { padding: 6px 4px; font-size: 10px; }
            .stat-val { font-size: 15px; }
            .detail-stat-val { font-size: 14px; }
            .week-label { font-size: 11px; min-width: 50px; }
            .week-info { font-size: 10px; }
            .week-bar { width: 30px; }
            .modal-overlay.active .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; width: 100%; max-width: none; height: 100%; max-height: 100%; border-radius: 0; transform: translateY(100%); display: flex; flex-direction: column; }
            .modal-overlay.active .modal { transform: translateY(0); }
            .modal { border: none; padding: 0; }
            .modal-head { padding: 14px; border-bottom: 1px solid var(--border); margin-bottom: 0; flex-shrink: 0; }
            #taskForm { padding: 14px; flex: 1; overflow-y: auto; }
            .form-actions { padding: 14px; border-top: 1px solid var(--border); flex-shrink: 0; margin-top: 0; background: var(--bg-secondary); }
            .form-input, .form-textarea, .form-select, .date-input { font-size: 16px; }
        }

        @media print {
            @page { margin: 0; }
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            body { background: white !important; color: black !important; }
            .header, .main, .sidebar, .toast-box, .modal-overlay, .mobile-nav, .dropdown-menu { display: none !important; }
            #printArea { display: block !important; padding: 10mm; background: white; color: black; }
            .print-head { text-align: center; font-size: 16pt; font-weight: bold; margin-bottom: 8px; border-bottom: 2px solid #000; padding-bottom: 6px; }
            .print-task { padding: 4px 0; border-bottom: 1px dotted #ccc; page-break-inside: avoid; }
            .print-card { width: 74mm; min-height: 105mm; padding: 8mm; margin: 5mm auto; border: 1px solid #ddd; page-break-inside: avoid; }
            .print-card-head { text-align: center; border-bottom: 2px solid #000; padding-bottom: 4px; margin-bottom: 6px; }
            .print-card-date { font-size: 12pt; font-weight: bold; }
            .print-card-day { font-size: 9pt; color: #444; }
            .print-card-body { margin-top: 4px; }
            .print-card-task { padding: 3px 0; border-bottom: 1px dotted #ccc; font-size: 8pt; display: flex; align-items: baseline; gap: 3px; }
            .print-card-task:last-child { border-bottom: none; }
            .print-check { width: 10px; height: 10px; border: 1.5px solid #000; border-radius: 50%; display: inline-block; flex-shrink: 0; }
            .print-check.done { background: #000; }
            .print-task-text { flex: 1; }
            .print-task-time { color: #666; font-size: 7pt; margin-left: auto; }
        }
        #printArea { display: none; }
    </style>
</head>
<body>
<header class="header">
    <div class="header-inner">
        <div class="logo"><div class="logo-icon">📅</div><span>Планировщик</span></div>
        <div class="nav-controls">
            <button class="nav-btn" id="prevMonth" type="button">‹</button>
            <button class="today-btn" id="todayBtn" type="button">Сегодня</button>
            <button class="nav-btn" id="nextMonth" type="button">›</button>
        </div>
        <div class="current-month" id="currentMonth"></div>
        <div class="header-actions">
            <div class="dropdown">
                <button class="btn" id="printBtn" type="button">🖨️ Печать</button>
                <div class="dropdown-menu" id="printMenu">
                    <button class="dropdown-item" onclick="printView('day')">📄 День</button>
                    <button class="dropdown-item" onclick="printView('week')">📄 Неделя</button>
                    <button class="dropdown-item" onclick="printView('card')">📇 Карточка</button>
                </div>
            </div>
            <div class="dropdown">
                <button class="btn" id="dataBtn" type="button">💾 Данные</button>
                <div class="dropdown-menu" id="dataMenu">
                    <button class="dropdown-item" onclick="exportJSON()">📤 Экспорт</button>
                    <button class="dropdown-item" onclick="document.getElementById('fileInput').click()">📥 Импорт</button>
                    <button class="dropdown-item" onclick="clearData()" style="color:var(--danger)">🗑️ Очистить</button>
                </div>
            </div>
        </div>
    </div>
</header>

<input type="file" id="fileInput" accept=".json" style="display:none">

<main class="main">
    <section class="calendar-section">
        <div class="weekdays"><div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div><div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div></div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </section>

    <aside class="sidebar">
        <div class="card">
            <div class="tabs">
                <button class="tab active" data-tab="today" onclick="switchTab('today')">📌 Сегодня</button>
                <button class="tab" data-tab="week" onclick="switchTab('week')">📊 Неделя</button>
                <button class="tab" data-tab="free" onclick="switchTab('free')">📝 Задачи</button>
                <button class="tab" data-tab="detail" onclick="switchTab('detail')">📅 По дням</button>
            </div>
            
            <!-- Tab: Today -->
            <div class="tab-content active" id="tab-today">
                <div id="todayStats"></div>
                <button class="add-btn" id="addTodayBtn" type="button" style="display:none" onclick="openModal(fmt(new Date()))">＋ Добавить на сегодня</button>
                <div class="task-list" id="todayList"></div>
            </div>

            <!-- Tab: Week -->
            <div class="tab-content" id="tab-week">
                <div id="weekStats"></div>
                <div id="weekBreak"></div>
            </div>

            <!-- Tab: Free Tasks (Новая вкладка) -->
            <div class="tab-content" id="tab-free">
                <div id="freeStats"></div>
                <div class="filter-group" id="freeGroupFilter">
                    <div class="filter-chip active" onclick="filterFreeTasks('all', this)">Все</div>
                    <div class="filter-chip" onclick="filterFreeTasks('work', this)">💼 Работа</div>
                    <div class="filter-chip" onclick="filterFreeTasks('home', this)">🏠 Дом</div>
                    <div class="filter-chip" onclick="filterFreeTasks('study', this)">🎓 Учёба</div>
                    <div class="filter-chip" onclick="filterFreeTasks('personal', this)">👤 Личное</div>
                </div>
                <button class="add-btn" onclick="openFreeModal()">＋ Новая задача</button>
                <div class="task-list" id="freeList"></div>
            </div>

            <!-- Tab: Detail (Day View) -->
            <div class="tab-content" id="tab-detail">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                    <div><div style="font-weight:700;font-size:15px" id="detailTitle">Выберите день</div><div style="font-size:11px;color:var(--text-secondary)" id="detailSub"></div></div>
                </div>
                <button class="add-btn" id="addDetailBtn" type="button" style="display:none" onclick="openModal(selDate)">＋ Добавить задачу</button>
                <div class="task-list" id="detailList"><div class="empty">Нажмите на день в календаре</div></div>
            </div>
        </div>

        <div class="card">
            <div class="stats-grid">
                <div class="stat"><div class="stat-val" id="sTotal">0</div><div class="stat-lbl">Всего</div></div>
                <div class="stat"><div class="stat-val" id="sActive">0</div><div class="stat-lbl">Активных</div></div>
                <div class="stat"><div class="stat-val" id="sDone">0</div><div class="stat-lbl">Готово</div></div>
            </div>
            <div class="progress"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
        </div>

        <div class="card">
            <div class="search-bar">
                <input type="text" class="search-input" id="searchInput" placeholder="🔍 Поиск..." oninput="renderDetail(selDate)">
                <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">Все</button>
                <button class="filter-btn" data-filter="active" onclick="setFilter('active', this)">Активные</button>
            </div>
        </div>

        <div class="card">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
                <span style="font-size:13px;font-weight:600;color:var(--text-secondary)">📋 Шаблоны</span>
                <button class="btn" type="button" style="padding:0 8px;height:30px" onclick="saveTemplate()">💾</button>
            </div>
            <div id="tplList"><div class="empty">Нет шаблонов</div></div>
        </div>
    </aside>
</main>

<nav class="mobile-nav">
    <div class="mobile-nav-inner">
        <button class="mobile-nav-item active" data-tab="today" onclick="switchTab('today')"><span class="nav-icon">📌</span><span>Сегодня</span></button>
        <button class="mobile-nav-item" data-tab="week" onclick="switchTab('week')"><span class="nav-icon">📊</span><span>Неделя</span></button>

</nav>

<!-- Modal for Day Tasks -->

    <div class="modal">
        <div class="modal-head"><div class="modal-title" id="modalTitle">Новая задача</div><button class="modal-close" type="button" onclick="closeModal()">✕</button></div>
        <form id="taskForm" onsubmit="return handleFormSubmit(event)">
            <div class="form-group"><label class="form-label">Название *</label><input type="text" class="form-input" id="tName" required placeholder="Что сделать?"></div>
            <div class="form-group"><label class="form-label">Дата *</label><input type="date" class="date-input" id="tDate" required></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Начало</label><input type="time" class="form-input" id="tStart"></div>
                <div class="form-group"><label class="form-label">Конец</label><input type="time" class="form-input" id="tEnd"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Приоритет</label><select class="form-input form-select" id="tPri"><option value="low">🟢 Низкий</option><option value="med" selected>🟡 Средний</option><option value="high">🔴 Высокий</option></select></div>

        <div class="modal-head"><div class="modal-title">Новая задача (Список)</div><button class="modal-close" type="button" onclick="closeFreeModal()">✕</button></div>
        <form id="freeTaskForm" onsubmit="return handleFreeFormSubmit(event)">
            <div class="form-group"><label class="form-label">Название *</label><input type="text" class="form-input" id="ftName" required placeholder="Что сделать?"></div>

                <label class="form-label">Группа</label>

                    <option value="work">💼 Работа</option>

<div class="modal-overlay" id="settingsModal">
    <div class="modal" style="max-width:340px">
        <div class="modal-head"><div class="modal-title">⚙️ Настройки</div><button class="modal-close" type="button" onclick="closeModal()">✕</button></div>

            <label class="form-label">Тема</label>

                <button class="btn" onclick="setTheme('dark')" style="padding:8px">🌙</button>
                <button class="btn" onclick="setTheme('light')" style="padding:8px">☀️</button>

                <button class="btn" onclick="setTheme('purple')" style="padding:8px">💜</button>
            </div>
            <button class="btn" style="width:100%;margin-bottom:6px" onclick="exportJSON(); closeModal()">📤 Экспорт</button>
            <button class="btn" style="width:100%;margin-bottom:6px" onclick="document.getElementById('fileInput').click(); closeModal()">📥 Импорт</button>
            <button class="btn" style="width:100%;color:var(--danger);border-color:var(--danger)" onclick="clearData(); closeModal()">🗑️ Очистить</button>
        </div>
    </div>
</div>

<div class="toast-box" id="toastBox"></div>
<div id="printArea"></div>

<script>
    // === STATE ===
    let curMonth = new Date().getMonth(), curYear = new Date().getFullYear();
    let selDate = null, tasks = {}, freeTasks = [], templates = {}, filter = 'all', freeFilter = 'all';
    const MONTHS = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const MONTHS_G = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const DAYS = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const DAYS_S = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];
    const GROUPS = { work: '💼 Работа', home: '🏠 Дом', study: '🎓 Учёба', personal: '👤 Личное', other: '📦 Другое' };

    // === UTILS ===
    function fmt(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function parse(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
    function esc(t) { if(!t) return ''; const d = document.createElement('div'); d.textContent = t; return d.innerHTML; }
    function toast(msg, type='success') {
        const t = document.createElement('div'); t.className = `toast ${type}`;
        t.innerHTML = `${type==='success'?'✅':type==='error'?'❌':'⚠️'} ${msg}`;
        document.getElementById('toastBox').appendChild(t);
        setTimeout(() => { t.classList.add('hiding'); setTimeout(()=>t.remove(), 2500); }, 2500);
    }

    // === STORAGE ===
    function load() {
        try {
            const t = localStorage.getItem('pl_tasks'); if(t) tasks = JSON.parse(t);
            const f = localStorage.getItem('pl_free_tasks'); if(f) freeTasks = JSON.parse(f);
            const p = localStorage.getItem('pl_tpls'); if(p) templates = JSON.parse(p);
        } catch(e) { console.error('Load error', e); }
    }
    function save() {
        try {
            localStorage.setItem('pl_tasks', JSON.stringify(tasks));
            localStorage.setItem('pl_free_tasks', JSON.stringify(freeTasks));
            localStorage.setItem('pl_tpls', JSON.stringify(templates));
        } catch(e) { toast('❌ Ошибка сохранения', 'error'); }
    }

    // === DAY TASK LOGIC ===
    function getTasks(ds) { return tasks[ds] || []; }
    function addTask(ds, data) {
        if(!tasks[ds]) tasks[ds] = [];
        tasks[ds].push({...data, id: Date.now().toString(36)+Math.random().toString(36).substr(2,5), completed:false, created:new Date().toISOString()});
        save();
    }
    function toggle(ds, id) {
        if(!tasks[ds]) return;
        const t = tasks[ds].find(x=>x.id===id);
        if(t) { t.completed=!t.completed; save(); updStats(); }
    }
    function delTask(ds, id) {
        if(!tasks[ds]) return;
        tasks[ds] = tasks[ds].filter(x => x.id !== id);
        if(!tasks[ds].length) delete tasks[ds];
        save();
    }

    // === FREE TASK LOGIC ===
    function addFreeTask(data) {
        freeTasks.push({...data, id: Date.now().toString(36)+Math.random().toString(36).substr(2,5), completed:false, created:new Date().toISOString()});
        save();
    }
    function toggleFree(id) {
        const t = freeTasks.find(x=>x.id===id);
        if(t) { t.completed=!t.completed; save(); renderFreeTasks(); }
    }
    function delFree(id) {
        freeTasks = freeTasks.filter(x => x.id !== id);
        save(); renderFreeTasks();
    }

    // === RENDER DAY ===
    function renderCal() {
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        document.getElementById('currentMonth').innerHTML = `${MONTHS[curMonth]} <span>${curYear}</span>`;
        const f = new Date(curYear, curMonth, 1); let sd = f.getDay(); sd = sd===0?6:sd-1;
        const dim = new Date(curYear, curMonth+1, 0).getDate(), dpm = new Date(curYear, curMonth, 0).getDate();
        const today = fmt(new Date()), cells = Math.ceil((sd+dim)/7)*7;
        const mob = window.innerWidth <= 768;

        for(let i=0; i<cells; i++) {
            const c = document.createElement('div'); c.className = 'calendar-day';
            let dn, mo, yr, ds;
            if(i<sd) { dn = dpm-sd+1+i; mo=curMonth-1; yr=curYear; if(mo<0){mo=11;yr--;} c.classList.add('other-month'); }
            else if(i>=sd+dim) { dn = i-sd-dim+1; mo=curMonth+1; yr=curYear; if(mo>11){mo=0;yr++;} c.classList.add('other-month'); }
            else { dn = i-sd+1; mo=curMonth; yr=curYear; }
            ds = `${yr}-${String(mo+1).padStart(2,'0')}-${String(dn).padStart(2,'0')}`;
            if(ds===today) c.classList.add('today'); if(ds===selDate) c.classList.add('selected');
            const dt = getTasks(ds);
            c.innerHTML = `<div class="day-num">${dn}</div>${dt.length?`<div class="task-badge">${dt.length}</div>`:''}
                <div class="day-tasks">${dt.slice(0, mob?1:3).map(t=>`<div class="day-task-preview ${t.completed?'completed':''}">${t.completed?'✓ ':''}${esc(t.name)}</div>`).join('')}</div>`;
            c.onclick = () => { selDate=ds; if(mo!==curMonth){curMonth=mo;curYear=yr;} renderCal(); showDetail(ds); switchTab('detail'); };
            grid.appendChild(c);
        }
        updStats();
    }

    function showDetail(ds) {
        const d = parse(ds);
        document.getElementById('detailTitle').textContent = `${d.getDate()} ${MONTHS_G[d.getMonth()]}`;
        document.getElementById('detailSub').textContent = `${DAYS[d.getDay()]}, ${d.getFullYear()}`;
        document.getElementById('addDetailBtn').style.display = 'flex';
        renderDetail(ds);
    }

    function renderDetail(ds) {
        const list = document.getElementById('detailList'); if(!list) return;
        let dt = getTasks(ds);
        const search = document.getElementById('searchInput').value.toLowerCase();
        if(search) dt = dt.filter(t => t.name.toLowerCase().includes(search) || (t.desc||'').toLowerCase().includes(search));
        if(filter==='active') dt = dt.filter(t => !t.completed);
        dt.sort((a,b) => { if(a.completed!==b.completed) return a.completed?1:-1; if(a.start&&b.start) return a.start.localeCompare(b.start); return 0; });
        list.innerHTML = dt.length ? dt.map(t => `<div class="task-item ${t.completed?'completed':''} priority-${t.pri||'med'}" data-ds="${ds}" data-id="${t.id}">
            <div class="task-check ${t.completed?'checked':''}" onclick="toggle('${ds}','${t.id}'); renderCal(); renderDetail('${ds}'); updToday();"></div>
            <div class="task-content"><div class="task-text">${esc(t.name)}</div>${t.start?`<div class="task-meta">🕐 ${t.start}${t.end?' — '+t.end:''}</div>`:''}
            ${t.tags?`<div class="task-meta">${t.tags.map(x=>`<span style="background:var(--accent-dim);padding:1px 4px;border-radius:3px;margin-right:3px">${esc(x)}</span>`).join('')}</div>`:''}</div>
            <div class="task-actions"><button class="task-btn del" onclick="if(confirm('Удалить?')){delTask('${ds}','${t.id}'); renderCal(); renderDetail('${ds}'); updToday(); toast('Удалено');}">✕</button></div></div>`).join('') : `<div class="empty">${search?'Ничего не найдено':'Нет задач'}</div>`;
    }

    function updToday() {
        const ds = fmt(new Date()), dt = getTasks(ds);
        const tot = dt.length, done = dt.filter(t=>t.completed).length, act = tot-done, pct = tot?Math.round(done/tot*100):0;
        let mins = 0; dt.forEach(t => { if(t.start&&t.end) { const [sh,sm]=t.start.split(':').map(Number), [eh,em]=t.end.split(':').map(Number); const m=(eh*60+em)-(sh*60+sm); if(m>0) mins+=m; } });
        const h = Math.floor(mins/60), m = mins%60;
        let mood = '😐'; if(pct===100&&tot) mood='🔥'; else if(pct>=75) mood='💪'; else if(pct>=50) mood='👍'; else if(!tot) mood='✨';
        document.getElementById('todayStats').innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:600;font-size:13px">📌 Сегодня</span><span style="font-size:18px">${mood}</span></div>
            <div class="detail-stats"><div class="detail-stat"><div class="detail-stat-val">${tot}</div><div class="detail-stat-lbl">Всего</div></div><div class="detail-stat"><div class="detail-stat-val">${done}</div><div class="detail-stat-lbl">Готово</div></div>
            <div class="detail-stat"><div class="detail-stat-val">${act}</div><div class="detail-stat-lbl">Осталось</div></div><div class="detail-stat hl"><div class="detail-stat-val">${pct}%</div><div class="detail-stat-lbl">Прогресс</div></div></div>
            ${h?`<div style="margin-top:6px;padding:6px;background:var(--bg-tertiary);border-radius:6px;border:1px solid var(--border)"><div style="font-size:10px;color:var(--text-secondary)">⏱️ Запланировано</div><div style="font-size:14px;font-weight:700">${h}ч ${m}мин</div></div>`:''}`;
        document.getElementById('todayList').innerHTML = dt.length ? dt.sort((a,b)=>{if(a.completed!==b.completed)return a.completed?1:-1;if(a.start&&b.start)return a.start.localeCompare(b.start);return 0;})
            .map(t=>`<div class="task-item ${t.completed?'completed':''} priority-${t.pri||'med'}"><div class="task-check ${t.completed?'checked':''}" onclick="toggle('${ds}','${t.id}'); renderCal(); updToday(); renderDetail('${ds}');"></div>
            <div class="task-content"><div class="task-text">${esc(t.name)}</div>${t.start?`<div class="task-meta">🕐 ${t.start}${t.end?'—'+t.end:''}</div>`:''}</div>
            <div class="task-actions"><button class="task-btn del" onclick="if(confirm('Удалить?')){delTask('${ds}','${t.id}'); renderCal(); updToday(); renderDetail('${ds}'); toast('Удалено');}">✕</button></div></div>`).join('') : `<div class="empty" style="padding:12px">Нет задач на сегодня</div>`;
        document.getElementById('addTodayBtn').style.display = dt.length ? 'none' : 'flex';
    }

    function updWeek() {
        const today = new Date(), off = today.getDay()===0?-6:1-today.getDay();
        const mon = new Date(today); mon.setDate(today.getDate()+off);
        let wt=0, wd=0, rows='';
        for(let i=0;i<7;i++) {
            const d=new Date(mon); d.setDate(mon.getDate()+i); const ds=fmt(d);
            const dt=getTasks(ds), dd=dt.filter(t=>t.completed).length, dtl=dt.length, dp=dtl?Math.round(dd/dtl*100):0;
            wt+=dtl; wd+=dd;
            const isT = ds===fmt(today);
            rows+=`<div class="week-row"><div class="week-label" style="${isT?'color:var(--accent)':''}">${isT?'👉 ':''}${DAYS_S[d.getDay()]} ${d.getDate()}</div><div class="week-info">${dtl} зад. · ${dd}✓</div><div class="week-bar"><div class="week-bar-fill" style="width:${dp}%"></div></div></div>`;
        }
        const wp = wt?Math.round(wd/wt*100):0;
        document.getElementById('weekStats').innerHTML = `<div style="font-weight:600;font-size:13px;margin-bottom:6px">📊 Неделя</div>
            <div class="detail-stats"><div class="detail-stat"><div class="detail-stat-val">${wt}</div><div class="detail-stat-lbl">Всего</div></div><div class="detail-stat"><div class="detail-stat-val">${wd}</div><div class="detail-stat-lbl">Готово</div></div>
            <div class="detail-stat"><div class="detail-stat-val">${wt-wd}</div><div class="detail-stat-lbl">Осталось</div></div><div class="detail-stat hl"><div class="detail-stat-val">${wp}%</div><div class="detail-stat-lbl">Прогресс</div></div></div>`;
        document.getElementById('weekBreak').innerHTML = rows;
    }

    // === RENDER FREE TASKS ===
    function renderFreeTasks() {
        const list = document.getElementById('freeList');
        let dt = [...freeTasks];
        if(freeFilter !== 'all') dt = dt.filter(t => t.group === freeFilter);
        
        const tot = dt.length, done = dt.filter(t=>t.completed).length, act = tot-done, pct = tot?Math.round(done/tot*100):0;
        
        document.getElementById('freeStats').innerHTML = `<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span style="font-weight:600;font-size:13px">📝 Независимые задачи</span></div>
            <div class="detail-stats"><div class="detail-stat"><div class="detail-stat-val">${tot}</div><div class="detail-stat-lbl">Всего</div></div><div class="detail-stat"><div class="detail-stat-val">${done}</div><div class="detail-stat-lbl">Готово</div></div>
            <div class="detail-stat"><div class="detail-stat-val">${act}</div><div class="detail-stat-lbl">Осталось</div></div><div class="detail-stat hl"><div class="detail-stat-val">${pct}%</div><div class="detail-stat-lbl">Прогресс</div></div></div>
            <div class="progress" style="margin-top:8px"><div class="progress-fill" style="width:${pct}%"></div></div>`;

        if(!dt.length) { list.innerHTML = `<div class="empty">${freeFilter!=='all'?'Нет задач в этой группе':'Список пуст. Добавьте задачу!'}</div>`; return; }
        
        list.innerHTML = dt.map(t => `<div class="task-item ${t.completed?'completed':''}">
            <div class="task-check ${t.completed?'checked':''}" onclick="toggleFree('${t.id}'); renderFreeTasks();"></div>
            <div class="task-content"><div class="task-text">${esc(t.name)}</div>
            <div class="task-meta"><span class="group-badge group-${t.group}">${GROUPS[t.group]||t.group}</span>${t.desc?`<span>${esc(t.desc)}</span>`:''}</div></div>
            <div class="task-actions"><button class="task-btn del" onclick="if(confirm('Удалить?')){delFree('${t.id}');}">✕</button></div></div>`).join('');
    }
    window.filterFreeTasks = function(g, el) {
        freeFilter = g;
        document.querySelectorAll('#freeGroupFilter .filter-chip').forEach(c=>c.classList.remove('active'));
        el.classList.add('active');
        renderFreeTasks();
    }

    function updStats() {
        let t=0,a=0,d=0; Object.values(tasks).forEach(arr=>arr.forEach(x=>{t++;if(x.completed)d++;else a++}));
        document.getElementById('sTotal').textContent=t; document.getElementById('sActive').textContent=a; document.getElementById('sDone').textContent=d;
        document.getElementById('progFill').style.width = (t?Math.round(d/t*100):0)+'%';
    }

    function renderTpls() {
        const k = Object.keys(templates);
        document.getElementById('tplList').innerHTML = k.length ? k.map(n=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px;background:var(--bg-tertiary);border:1px solid var(--border);border-radius:6px;margin-bottom:4px">
            <span style="font-size:13px;cursor:pointer" onclick="applyTpl('${n}')">📋 ${esc(n)}</span><button class="task-btn del" onclick="if(confirm('Удалить шаблон?')){delete templates['${n}']; save(); renderTpls(); toast('Удалён');}">✕</button></div>`).join('') : `<div class="empty" style="padding:8px">Нет шаблонов</div>`;
    }

    // === UI CONTROLS ===
    window.switchTab = function(tab) {
        document.querySelectorAll('.tab, .mobile-nav-item').forEach(x=>x.classList.toggle('active', x.dataset.tab===tab));
        document.querySelectorAll('.tab-content').forEach(c=>c.classList.toggle('active', c.id==='tab-'+tab));
        if(tab==='today') updToday(); if(tab==='week') updWeek(); if(tab==='free') renderFreeTasks();
    };
    window.setFilter = function(f, btn) {
        filter = f;
        document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(selDate) renderDetail(selDate);
    };
    window.openModal = function(ds) {
        document.getElementById('modalTitle').textContent = 'Новая задача';
        document.getElementById('taskForm').reset();
        document.getElementById('tDate').value = ds || fmt(new Date());
        document.getElementById('tPri').value = 'med';
        document.getElementById('taskModal').classList.add('active');
        setTimeout(()=>document.getElementById('tName').focus(), 100);
    };
    window.openFreeModal = function() {
        document.getElementById('freeTaskForm').reset();
        document.getElementById('freeTaskModal').classList.add('active');
        setTimeout(()=>document.getElementById('ftName').focus(), 100);
    };
    window.closeModal = function() { document.querySelectorAll('.modal-overlay').forEach(m=>m.classList.remove('active')); };
    window.closeFreeModal = function() { document.getElementById('freeTaskModal').classList.remove('active'); };

    // ✅ DAY FORM SUBMIT
    window.handleFormSubmit = function(e) {
        e.preventDefault(); e.stopPropagation();
        const ds = document.getElementById('tDate').value;
        const name = document.getElementById('tName').value.trim();
        if(!ds || !name) { toast('❌ Заполните дату и название', 'error'); return false; }
        const data = { name, start: document.getElementById('tStart').value, end: document.getElementById('tEnd').value, desc: document.getElementById('tDesc').value.trim(), tags: document.getElementById('tTags').value.split(',').map(t=>t.trim()).filter(Boolean), pri: document.getElementById('tPri').value };
        try { addTask(ds, data); selDate = ds; closeModal(); renderCal(); showDetail(ds); updToday(); updWeek(); toast('✅ Задача создана'); return false; } 
        catch(err) { console.error(err); toast('❌ Ошибка: ' + err.message, 'error'); return false; }
    };

    // ✅ FREE FORM SUBMIT
    window.handleFreeFormSubmit = function(e) {
        e.preventDefault(); e.stopPropagation();
        const name = document.getElementById('ftName').value.trim();
        const group = document.getElementById('ftGroup').value;
        if(!name) { toast('❌ Введите название', 'error'); return false; }
        try {
            addFreeTask({ name, group, desc: document.getElementById('ftDesc').value.trim() });
            closeFreeModal(); renderFreeTasks(); toast('✅ Задача добавлена в список'); return false;
        } catch(err) { console.error(err); toast('❌ Ошибка', 'error'); return false; }
    };

    window.saveTemplate = function() {
        if(!selDate) { selDate = fmt(new Date()); openModal(selDate); return; }
        const dt = getTasks(selDate); if(!dt.length) { toast('Нет задач для шаблона', 'warning'); return; }
        const name = prompt('Название шаблона:'); if(!name) return;
        templates[name] = { tasks: dt.map(t=>({name:t.name,start:t.start,end:t.end,desc:t.desc,tags:t.tags,pri:t.pri})), created: new Date().toISOString() };
        save(); renderTpls(); toast('Шаблон сохранён');
    };
    window.applyTpl = function(n) { const t=templates[n]; if(!t||!selDate) return; t.tasks.forEach(d=>addTask(selDate, d)); save(); renderDetail(selDate); renderCal(); updToday(); toast(`"${n}" применён`); };
    window.setTheme = function(n) { document.body.setAttribute('data-theme', n); localStorage.setItem('pl_theme', n); };
    window.exportJSON = function() {
        const b = new Blob([JSON.stringify({tasks, freeTasks, templates, v:3, t:new Date().toISOString()}, null, 2)], {type:'application/json'});
        const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = `planner_${fmt(new Date())}.json`; a.click(); toast('Экспортировано');
    };
    window.clearData = function() { if(confirm('Удалить ВСЕ данные?')) { tasks={}; freeTasks=[]; templates={}; save(); renderCal(); if(selDate) renderDetail(selDate); renderTpls(); updToday(); updWeek(); renderFreeTasks(); toast('Очищено'); } };
    window.printView = function(type) {
        document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('active'));
        const pa = document.getElementById('printArea');
        if(type==='day' || type==='card') {
            const ds = selDate || fmt(new Date()), d = parse(ds), dt = getTasks(ds);
            if(type==='card') {
                pa.innerHTML = `<div class="print-card"><div class="print-card-head"><div class="print-card-date">${d.getDate()} ${MONTHS_G[d.getMonth()]} ${d.getFullYear()}</div><div class="print-card-day">${DAYS[d.getDay()]}</div></div>
                <div class="print-card-body">${dt.length?dt.map(t=>`<div class="print-card-task"><span class="print-check ${t.completed?'done':''}"></span><span class="print-task-text">${esc(t.name)}</span>${t.start?`<span class="print-task-time">${t.start}</span>`:''}</div>`).join(''):'<div style="text-align:center;color:#999;padding:10px">Нет задач</div>'}</div></div>`;
            } else {
                pa.innerHTML = `<div class="print-head">📅 ${d.getDate()} ${MONTHS_G[d.getMonth()]} ${d.getFullYear()} — ${DAYS[d.getDay()]}</div>
                <div>${dt.length?dt.map(t=>`<div class="print-task">${t.completed?'☑':'☐'} <b>${esc(t.name)}</b>${t.start?` (${t.start}—${t.end||'—'})`:''}</div>`).join(''):'<p style="text-align:center;color:#666">Нет задач</p>'}</div>`;
            }
        } else if(type==='week') {
            const ref = selDate ? parse(selDate) : new Date(), off = ref.getDay()===0?-6:1-ref.getDay();
            const mon = new Date(ref); mon.setDate(ref.getDate()+off);
            let h = `<div class="print-head">📅 ${mon.getDate()} ${MONTHS_G[mon.getMonth()]} — `;
            const sun = new Date(mon); sun.setDate(mon.getDate()+6);
            h += `${sun.getDate()} ${MONTHS_G[sun.getMonth()]} ${sun.getFullYear()}</div>`;
            for(let i=0;i<7;i++) {
                const d=new Date(mon); d.setDate(mon.getDate()+i); const ds=fmt(d); const dt=getTasks(ds);
                h+=`<div style="margin:10px 0 4px;border-bottom:2px solid #000;padding-bottom:4px"><b>${DAYS_S[d.getDay()]}, ${d.getDate()}</b></div>`;
                h+=dt.length?dt.map(t=>`<div class="print-task">${t.completed?'☑':'☐'} ${esc(t.name)}</div>`).join(''):'<div style="color:#aaa;font-size:9pt">Нет</div>';
            }
            pa.innerHTML = h;
        }
        setTimeout(()=>window.print(), 100);
    };

    document.getElementById('fileInput').onchange = (e) => {
        const f = e.target.files[0]; if(!f) return;
        const r = new FileReader();
        r.onload = (ev) => {
            try {
                const imp = JSON.parse(ev.target.result);
                if(!imp.tasks) throw new Error('Неверный формат');
                if(confirm('OK — заменить\nОтмена — объединить')) { tasks=imp.tasks||{}; freeTasks=imp.freeTasks||[]; templates=imp.templates||{}; }
                else {
                    for(const d in imp.tasks) { if(!tasks[d]) tasks[d]=[]; const ids=new Set(tasks[d].map(t=>t.id)); imp.tasks[d].forEach(t=>{if(!ids.has(t.id)) tasks[d].push(t);}); }
                    for(const n in imp.templates) if(!templates[n]) templates[n]=imp.templates[n];
                }
                save(); renderCal(); if(selDate) renderDetail(selDate); renderTpls(); updToday(); updWeek(); renderFreeTasks(); toast('Импортировано');
            } catch(err) { toast('Ошибка формата', 'error'); }
        };
        r.readAsText(f); e.target.value='';
    };

    document.getElementById('prevMonth').onclick = () => { curMonth--; if(curMonth<0){curMonth=11;curYear--;} renderCal(); };
    document.getElementById('nextMonth').onclick = () => { curMonth++; if(curMonth>11){curMonth=0;curYear++;} renderCal(); };
    document.getElementById('todayBtn').onclick = () => { const t=new Date(); curMonth=t.getMonth(); curYear=t.getFullYear(); renderCal(); selDate=fmt(t); showDetail(selDate); updToday(); switchTab('today'); };
    document.getElementById('printBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('printMenu').classList.toggle('active'); };
    document.getElementById('dataBtn').onclick = (e) => { e.stopPropagation(); document.getElementById('dataMenu').classList.toggle('active'); };
    document.addEventListener('click', () => document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('active')));

    let tx=0, ty=0;
    document.addEventListener('touchstart', e => { tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
    document.addEventListener('touchend', e => {
        const dx = e.changedTouches[0].clientX - tx, dy = Math.abs(e.changedTouches[0].clientY - ty);
        if(Math.abs(dx)>80 && dy<50 && !e.target.closest('.task-list, .modal, .modal-overlay')) {
            if(dx>0) { curMonth--; if(curMonth<0){curMonth=11;curYear--;} } else { curMonth++; if(curMonth>11){curMonth=0;curYear++;} }
            renderCal();
        }
    }, {passive:true});

    function init() {
        const saved = localStorage.getItem('pl_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        setTheme(saved);
        load(); renderCal(); renderTpls();
        selDate = fmt(new Date()); showDetail(selDate); updToday(); updWeek(); renderFreeTasks();
        console.log('✅ Запущено.');
    }
    window.onerror = function(msg, url, line) { console.error('❌ Глобальная ошибка:', msg, line); toast('Ошибка скрипта: ' + msg, 'error'); return false; };
    init();
</script>
</body>
</html>
