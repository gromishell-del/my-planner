<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Календарь — Ежедневник</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

        :root {
            --bg-primary: #0a0a0a; --bg-secondary: #141414; --bg-tertiary: #1e1e1e;
            --bg-card: #1a1a1a; --bg-hover: #252525; --bg-active: #2a2a2a;
            --border: #2a2a2a; --border-light: #333333;
            --text-primary: #ffffff; --text-secondary: #a0a0a0; --text-muted: #666666;
            --accent: #ffffff; --accent-dim: rgba(255,255,255,0.1); --accent-hover: rgba(255,255,255,0.15);
            --danger: #ff4444; --success: #44ff88; --warning: #ffaa44; --info: #44aaff;
            --shadow: 0 8px 32px rgba(0,0,0,0.4); --shadow-lg: 0 16px 64px rgba(0,0,0,0.6);
            --radius: 12px; --radius-sm: 8px; --radius-lg: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --header-height: 64px;
            --nav-height: 60px;
        }

        [data-theme="light"] {
            --bg-primary: #f8f9fa; --bg-secondary: #ffffff; --bg-tertiary: #f1f3f5;
            --bg-card: #ffffff; --bg-hover: #e9ecef; --bg-active: #dee2e6;
            --border: #dee2e6; --border-light: #ced4da;
            --text-primary: #212529; --text-secondary: #495057; --text-muted: #868e96;
            --accent: #212529; --accent-dim: rgba(33,37,41,0.1); --accent-hover: rgba(33,37,41,0.15);
            --danger: #dc3545; --success: #28a745; --warning: #fd7e14; --info: #007bff;
        }

        [data-theme="blue"] {
            --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-tertiary: #334155;
            --bg-card: #1e293b; --bg-hover: #334155; --bg-active: #475569;
            --border: #334155; --border-light: #475569;
            --text-primary: #f1f5f9; --text-secondary: #cbd5e1; --text-muted: #94a3b8;
            --accent: #3b82f6; --accent-dim: rgba(59,130,246,0.15); --accent-hover: rgba(59,130,246,0.25);
            --danger: #ef4444; --success: #22c55e; --warning: #f59e0b; --info: #60a5fa;
        }

        [data-theme="purple"] {
            --bg-primary: #1a1025; --bg-secondary: #251a35; --bg-tertiary: #352545;
            --bg-card: #2a1f3f; --bg-hover: #3a2a55; --bg-active: #4a3a65;
            --border: #4a3a65; --border-light: #5a4a75;
            --text-primary: #f5f0ff; --text-secondary: #d5c5e5; --text-muted: #a595b5;
            --accent: #a855f7; --accent-dim: rgba(168,85,247,0.15); --accent-hover: rgba(168,85,247,0.25);
            --danger: #f43f5e; --success: #22d3ee; --warning: #fbbf24; --info: #818cf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html { touch-action: manipulation; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; overflow-x: hidden; transition: background var(--transition), color var(--transition); }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 2px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        @keyframes slideDown { from { transform: translateY(0); } to { transform: translateY(100%); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes taskAppear { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes themeSwitch { 0% { opacity: 0.7; } 50% { opacity: 1; } 100% { opacity: 0.7; } }
        .animate-in { animation: fadeInUp 0.5s ease forwards; }
        .theme-switching { animation: themeSwitch 0.3s ease; }

        .header { position: sticky; top: 0; z-index: 100; background: rgba(10, 10, 10, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); height: var(--header-height); padding: 0 16px; display: flex; align-items: center; animation: fadeInDown 0.4s ease; transition: background var(--transition); }
        [data-theme="light"] .header { background: rgba(248, 249, 250, 0.85); }
        .header-inner { width: 100%; max-width: 1400px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; white-space: nowrap; }
        .logo-icon { width: 32px; height: 32px; background: var(--text-primary); color: var(--bg-primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
        .nav-controls { display: flex; align-items: center; gap: 6px; }
        .nav-btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); width: 38px; height: 38px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 18px; min-width: 44px; min-height: 44px; }
        .current-month { font-size: 18px; font-weight: 600; min-width: 160px; text-align: center; }
        .current-month span { color: var(--text-secondary); font-weight: 400; }
        .header-actions { display: flex; align-items: center; gap: 6px; }
        .btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 14px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 500; transition: var(--transition); display: flex; align-items: center; gap: 6px; white-space: nowrap; min-height: 44px; }
        .btn-primary { background: var(--text-primary); color: var(--bg-primary); border-color: var(--text-primary); font-weight: 600; }
        .btn-accent { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); font-weight: 600; }
        .today-btn { background: var(--bg-tertiary); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 14px; border-radius: var(--radius-sm); font-family: inherit; font-size: 13px; font-weight: 600; transition: var(--transition); min-height: 44px; }

        .theme-switcher { display: flex; gap: 3px; padding: 3px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .theme-btn { width: 26px; height: 26px; border-radius: 5px; border: 2px solid transparent; display: flex; align-items: center; justify-content: center; font-size: 11px; min-width: 30px; min-height: 30px; }
        .theme-btn:hover, .theme-btn.active { border-color: var(--text-primary); transform: scale(1.1); }
        .theme-dark { background: #1a1a1a; } .theme-light { background: #f8f9fa; }
        .theme-blue { background: linear-gradient(135deg, #1e3a8a, #3b82f6); } .theme-purple { background: linear-gradient(135deg, #5b21b6, #a855f7); }

        /* === MAIN LAYOUT === */
        .main { max-width: 1400px; margin: 0 auto; padding: 16px; display: grid; grid-template-columns: 1fr 420px; gap: 16px; animation: fadeIn 0.6s ease; padding-bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px); }
        .calendar-section { animation: fadeInUp 0.5s ease 0.1s both; }
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 6px; }
        .weekday { text-align: center; padding: 8px 0; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .calendar-day { aspect-ratio: 1; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px; display: flex; flex-direction: column; position: relative; overflow: hidden; min-height: 80px; }
        .calendar-day:active { transform: scale(0.96); background: var(--bg-hover); }
        .calendar-day.other-month { opacity: 0.3; }
        .calendar-day.today { border-color: var(--accent); background: var(--accent-dim); box-shadow: 0 0 0 1px var(--accent); }
        .calendar-day.today .day-number { background: var(--accent); color: var(--bg-primary); }
        .calendar-day.selected { border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent); }
        .day-number { font-size: 13px; font-weight: 600; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .day-tasks { flex: 1; margin-top: 3px; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
        .day-task-preview { font-size: 9px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; padding: 1px 3px; background: var(--accent-dim); border-radius: 2px; }
        .day-task-preview.completed { text-decoration: line-through; opacity: 0.5; }
        .day-more { font-size: 9px; color: var(--text-muted); margin-top: 1px; }
        .task-count-badge { position: absolute; top: 4px; right: 4px; width: 16px; height: 16px; background: var(--accent); color: var(--bg-primary); border-radius: 50%; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; }
        .multi-day-indicator { position: absolute; bottom: 3px; left: 50%; transform: translateX(-50%); font-size: 8px; color: var(--warning); background: var(--bg-primary); padding: 1px 4px; border-radius: 3px; border: 1px solid var(--border); display: none; }
        .calendar-day.has-multi-day .multi-day-indicator { display: block; }

        .sidebar { display: flex; flex-direction: column; gap: 12px; animation: slideUp 0.4s ease 0.2s both; }
        .sidebar-card { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; }

        .sidebar-tabs { display: flex; gap: 2px; background: var(--bg-tertiary); border-radius: var(--radius-sm); padding: 3px; margin-bottom: 12px; }
        .sidebar-tab { flex: 1; padding: 10px 8px; text-align: center; font-size: 13px; font-weight: 600; color: var(--text-secondary); border-radius: 6px; border: none; background: none; font-family: inherit; min-height: 44px; display: flex; align-items: center; justify-content: center; }
        .sidebar-tab:hover { color: var(--text-primary); }
        .sidebar-tab.active { background: var(--bg-active); color: var(--text-primary); }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.25s ease; }

        .selected-date-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .selected-date-title { font-size: 17px; font-weight: 700; }
        .selected-date-subtitle { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

        .add-task-btn { width: 100%; padding: 14px; background: var(--bg-tertiary); border: 1px dashed var(--border-light); border-radius: var(--radius-sm); color: var(--text-secondary); font-family: inherit; font-size: 15px; font-weight: 500; transition: var(--transition); display: flex; align-items: center; justify-content: center; gap: 8px; min-height: 50px; }
        .add-task-btn:active { background: var(--bg-hover); color: var(--text-primary); }

        .task-list { display: flex; flex-direction: column; gap: 4px; max-height: 300px; overflow-y: auto; }
        .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: var(--transition); animation: taskAppear 0.3s ease forwards; position: relative; min-height: 50px; }
        .task-item:active { background: var(--bg-hover); }
        .task-item.completed { opacity: 0.6; }
        .task-item.completed .task-text { text-decoration: line-through; color: var(--text-muted); }
        .task-item.multi-day-task { border-left: 3px solid var(--warning); }
        .task-item.priority-high { border-left: 3px solid var(--danger); }
        .task-item.priority-med { border-left: 3px solid var(--warning); }
        .task-item.priority-low { border-left: 3px solid var(--success); }

        .task-checkbox { width: 22px; height: 22px; border: 2px solid var(--border-light); border-radius: 50%; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; min-width: 22px; }
        .task-checkbox.checked { background: var(--accent); border-color: var(--accent); }
        .task-checkbox.checked::after { content: '✓'; color: var(--bg-primary); font-size: 12px; font-weight: 700; }
        .task-content { flex: 1; min-width: 0; }
        .task-text { font-size: 14px; font-weight: 500; line-height: 1.4; }
        .task-time { font-size: 11px; color: var(--text-muted); margin-top: 3px; display: flex; align-items: center; gap: 4px; }
        .task-description { font-size: 12px; color: var(--text-secondary); margin-top: 4px; line-height: 1.3; }
        .task-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .task-tag { font-size: 10px; padding: 2px 6px; background: var(--accent-dim); color: var(--text-secondary); border-radius: 4px; }
        .task-actions { display: flex; gap: 4px; }
        .task-action-btn { width: 36px; height: 36px; border: none; background: transparent; color: var(--text-muted); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 16px; min-width: 36px; }
        .task-action-btn:active { background: var(--bg-active); color: var(--text-primary); }
        .task-action-btn.delete:active { color: var(--danger); }

        .empty-state { text-align: center; padding: 24px 16px; color: var(--text-muted); }
        .empty-state-icon { font-size: 32px; margin-bottom: 10px; opacity: 0.3; }
        .empty-state-text { font-size: 14px; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .stat-item { text-align: center; padding: 10px 6px; background: var(--bg-tertiary); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .stat-value { font-size: 20px; font-weight: 800; letter-spacing: -1px; }
        .stat-label { font-size: 9px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
        .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .progress-fill { height: 100%; background: var(--success); border-radius: 2px; transition: width 0.3s; }

        .detail-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin: 10px 0; }
        .detail-stat { padding: 10px; background: var(--bg-tertiary); border-radius: var(--radius-sm); border: 1px solid var(--border); }
        .detail-stat-value { font-size: 18px; font-weight: 700; }
        .detail-stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
        .detail-stat.highlight { border-color: var(--accent); }
        .detail-stat.highlight .detail-stat-value { color: var(--accent); }

        .week-day-row { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); }
        .week-day-row:last-child { border-bottom: none; }
        .week-day-label { font-size: 12px; font-weight: 600; min-width: 70px; color: var(--text-secondary); }
        .week-day-tasks { flex: 1; font-size: 11px; color: var(--text-muted); }
        .week-day-progress { width: 50px; }
        .week-day-progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .week-day-progress-fill { height: 100%; background: var(--success); border-radius: 2px; }

        .templates-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
        .templates-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .templates-title { font-size: 13px; font-weight: 600; color: var(--text-secondary); }
        .template-list { display: flex; flex-direction: column; gap: 4px; }
        .template-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px; min-height: 50px; }
        .template-item:active { background: var(--bg-hover); }
        .template-actions { display: flex; gap: 4px; }

        .search-bar { display: flex; gap: 6px; margin-bottom: 12px; }
        .search-input { flex: 1; padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 13px; min-height: 44px; }
        .filter-btn { padding: 10px 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-secondary); font-size: 13px; min-height: 44px; }
        .filter-btn.active, .filter-btn:active { background: var(--accent); color: var(--bg-primary); border-color: var(--accent); }

        /* === MODAL (Desktop) === */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: var(--transition); }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 500px; max-height: 85vh; overflow-y: auto; transform: scale(0.9) translateY(20px); transition: var(--transition); }
        .modal-overlay.active .modal { transform: scale(1) translateY(0); }
        .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .modal-title { font-size: 18px; font-weight: 700; }
        .modal-close { width: 40px; height: 40px; border: 1px solid var(--border); background: var(--bg-tertiary); color: var(--text-primary); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 20px; min-width: 44px; min-height: 44px; }

        .form-group { margin-bottom: 16px; }
        .form-label { display: block; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-secondary); margin-bottom: 6px; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 12px; background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-family: inherit; font-size: 14px; outline: none; min-height: 44px; }
        .form-input:focus, .form-textarea:focus, .form-select:focus { border-color: var(--accent); }
        .form-textarea { resize: vertical; min-height: 80px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .date-range-group { background: var(--bg-tertiary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px; }
        .date-range-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
        .date-range-row:last-child { margin-bottom: 0; }
        .date-range-label { font-size: 12px; color: var(--text-secondary); min-width: 60px; font-weight: 500; }
        .date-range-input { flex: 1; padding: 10px; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 6px; color: var(--text-primary); font-family: inherit; font-size: 13px; min-height: 44px; }
        .repeat-options { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
        .repeat-option { display: flex; align-items: center; gap: 8px; padding: 8px 0; font-size: 14px; min-height: 44px; }
        .repeat-option input { width: 20px; height: 20px; }
        .form-actions { display: flex; gap: 8px; margin-top: 20px; }
        .form-actions .btn { flex: 1; justify-content: center; padding: 14px; min-height: 50px; }

        .dropdown { position: relative; }
        .dropdown-menu { position: absolute; top: calc(100% + 8px); right: 0; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; min-width: 180px; box-shadow: var(--shadow-lg); opacity: 0; visibility: hidden; transform: translateY(-8px); transition: var(--transition); z-index: 200; }
        .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateY(0); }
        .dropdown-item { display: flex; align-items: center; gap: 8px; padding: 12px; border: none; background: none; color: var(--text-primary); font-family: inherit; font-size: 14px; border-radius: var(--radius-sm); transition: var(--transition); width: 100%; text-align: left; min-height: 48px; }
        .dropdown-item:active { background: var(--bg-hover); }
        .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

        .toast-container { position: fixed; bottom: calc(var(--nav-height) + var(--safe-bottom) + 16px); left: 16px; right: 16px; z-index: 2000; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
        .toast { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow); animation: fadeIn 0.3s ease; display: flex; align-items: center; gap: 10px; pointer-events: auto; }
        .toast.success { border-left: 3px solid var(--success); } .toast.error { border-left: 3px solid var(--danger); } .toast.warning { border-left: 3px solid var(--warning); }
        .toast.removing { animation: fadeIn 0.3s ease reverse forwards; }

        .context-menu { position: fixed; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: var(--radius); padding: 6px; min-width: 180px; box-shadow: var(--shadow-lg); z-index: 3000; animation: fadeInScale 0.15s ease; }
        .context-menu-item { display: flex; align-items: center; gap: 8px; padding: 12px; border: none; background: none; color: var(--text-primary); font-family: inherit; font-size: 14px; border-radius: 6px; transition: var(--transition); width: 100%; text-align: left; min-height: 48px; }
        .context-menu-item:active { background: var(--bg-hover); }

        #fileInput, #templateFileInput { display: none; }

        /* === MOBILE BOTTOM NAV === */

<script>
    let currentDate = new Date(), currentMonth = currentDate.getMonth(), currentYear = currentDate.getFullYear();
    let selectedDate = null, tasks = {}, templates = {}, editingTaskId = null, currentFilter = 'all', searchQuery = '';
    let touchStartX = 0, touchStartY = 0, longPressTimer = null;
    const MONTHS_RU = ['Январь','Февраль','Март','Апрель','Май','Июнь','Июль','Август','Сентябрь','Октябрь','Ноябрь','Декабрь'];
    const MONTHS_RU_GEN = ['января','февраля','марта','апреля','мая','июня','июля','августа','сентября','октября','ноября','декабря'];
    const DAYS_RU = ['Воскресенье','Понедельник','Вторник','Среда','Четверг','Пятница','Суббота'];
    const DAYS_RU_SHORT = ['Вс','Пн','Вт','Ср','Чт','Пт','Сб'];

    // DOM cache
    const DOM = {};
    function cacheDOM() {
        ['calendarGrid','currentMonth','statTotal','statActive','statDone','progressFill',
         'todayStats','todayTimeSummary','todayTaskList','addTaskBtnToday',
         'weekStats','weekDayBreakdown',
         'selectedDateTitle','selectedDateSubtitle','addTaskBtn','taskList',
         'templateList','searchInput','toastContainer','printArea'
        ].forEach(id => DOM[id] = document.getElementById(id));
    }

    function init() { loadTheme(); loadTasks(); loadTemplates(); cacheDOM(); renderCalendar(); renderTemplates(); setupEventListeners(); selectDate(formatDate(new Date())); updateTodayStats(); updateWeekStats(); }

    function loadTheme() { const saved = localStorage.getItem('planner_theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'); applyTheme(saved); }
    function applyTheme(name) { document.body.setAttribute('data-theme', name); document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.theme === name)); }
    function changeTheme(name) { applyTheme(name); localStorage.setItem('planner_theme', name); }
    function formatDate(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
    function parseDate(str) { const [y,m,d] = str.split('-').map(Number); return new Date(y, m-1, d); }
    function formatDateDisplay(dateStr) { const d = parseDate(dateStr); return `${d.getDate()} ${MONTHS_RU_GEN[d.getMonth()]}`; }
    function escapeHtml(str) { if (!str) return ''; const div = document.createElement('div'); div.textContent = str; return div.innerHTML; }

    function loadTasks() { try { const data = localStorage.getItem('planner_tasks'); if (data) tasks = JSON.parse(data); } catch { tasks = {}; } }
    function saveTasks() { try { localStorage.setItem('planner_tasks', JSON.stringify(tasks)); } catch (e) { if (e.name === 'QuotaExceededError') showToast('⚠️ Хранилище заполнено', 'error'); } }
    function loadTemplates() { try { const data = localStorage.getItem('planner_templates'); if (data) templates = JSON.parse(data); } catch { templates = {}; } }

    function getAllTasksForDate(dateStr) { return tasks[dateStr] || []; }
    function getTasksForDate(dateStr) { return (tasks[dateStr] || []).filter(t => !t.multiDayParentId); }
    function addTask(dateStr, task, isMultiDay = false, dateRange = null) {
        if (!tasks[dateStr]) tasks[dateStr] = [];
        task.id = Date.now().toString(36) + Math.random().toString(36).substr(2, 9);
        task.completed = false; task.createdAt = new Date().toISOString(); task.multiDay = isMultiDay;
        if (isMultiDay && dateRange) { task.dateRange = dateRange; task.multiDayParentId = task.id; }

    }
    function addTaskToMultipleDates(dates, taskData) { dates.forEach(dateStr => { addTask(dateStr, {...taskData}, dates.length > 1, { start: dates[0], end: dates[dates.length - 1] }); }); }
    function updateTask(dateStr, taskId, updates) { if (!tasks[dateStr]) return; const task = tasks[dateStr].find(t => t.id === taskId); if (task) { Object.assign(task, updates); saveTasks(); } }
    function deleteTask(dateStr, taskId, all = false) {
        if (!tasks[dateStr]) return; const task = tasks[dateStr].find(t => t.id === taskId);
        if (task?.multiDay && task.multiDayParentId && all) { Object.keys(tasks).forEach(d => { tasks[d] = tasks[d].filter(t => t.multiDayParentId !== task.multiDayParentId && t.id !== task.multiDayParentId); if (tasks[d].length === 0) delete tasks[d]; }); }
        else { tasks[dateStr] = tasks[dateStr].filter(t => t.id !== taskId); if (tasks[dateStr].length === 0) delete tasks[dateStr]; }
        saveTasks();
    }
    function toggleTask(dateStr, taskId) { if (!tasks[dateStr]) return; const task = tasks[dateStr].find(t => t.id === taskId); if (task) { task.completed = !task.completed; task.updatedAt = new Date().toISOString(); saveTasks(); } updateTodayStats(); updateWeekStats(); }
    function getDatesInRange(start, end) { const dates = [], current = new Date(start), e = new Date(end); while (current <= e) { dates.push(formatDate(current)); current.setDate(current.getDate() + 1); } return dates; }

    function renderCalendar() {
        const grid = DOM.calendarGrid; grid.innerHTML = '';
        DOM.currentMonth.innerHTML = `${MONTHS_RU[currentMonth]} <span>${currentYear}</span>`;
        const firstDay = new Date(currentYear, currentMonth, 1); let startDay = firstDay.getDay(); startDay = startDay === 0 ? 6 : startDay - 1;
        const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate(); const daysInPrevMonth = new Date(currentYear, currentMonth, 0).getDate();
        const todayStr = formatDate(new Date()), totalCells = Math.ceil((startDay + daysInMonth) / 7) * 7;
        const isMobile = window.innerWidth <= 768;

        for (let i = 0; i < totalCells; i++) {
            const cell = document.createElement('div'); cell.className = 'calendar-day';
            let dayNum, month, year, dateStr;
            if (i < startDay) { dayNum = daysInPrevMonth - startDay + 1 + i; month = currentMonth - 1; year = currentYear; if (month < 0) { month = 11; year--; } cell.classList.add('other-month'); }
            else if (i >= startDay + daysInMonth) { dayNum = i - startDay - daysInMonth + 1; month = currentMonth + 1; year = currentYear; if (month > 11) { month = 0; year++; } cell.classList.add('other-month'); }
            else { dayNum = i - startDay + 1; month = currentMonth; year = currentYear; }
            dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(dayNum).padStart(2, '0')}`;
            if (dateStr === todayStr) cell.classList.add('today'); if (dateStr === selectedDate) cell.classList.add('selected');
            const dayTasks = getAllTasksForDate(dateStr), hasMultiDay = dayTasks.some(t => t.multiDay);
            cell.innerHTML = `<div class="day-number">${dayNum}</div>${dayTasks.length > 0 ? `<div class="task-count-badge">${dayTasks.length}</div>` : ''}${hasMultiDay ? '<div class="multi-day-indicator">🔄</div>' : ''}<div class="day-tasks">${dayTasks.slice(0, isMobile ? 1 : 3).map(t => `<div class="day-task-preview ${t.completed ? 'completed' : ''}">${t.completed ? '✓ ' : ''}${escapeHtml(t.name)}</div>`).join('')}${!isMobile && dayTasks.length > 3 ? `<div class="day-more">+${dayTasks.length - 3}</div>` : ''}</div>`;

    function showContextMenu(x, y, dateStr) {

    function renderTaskList(dateStr) {

        if (currentFilter === 'active') dayTasks = dayTasks.filter(t => !t.completed);

    // Event delegation for task list
    function setupTaskListDelegation(listId, dateStr) {

    function updateTodayStats() {
        const todayStr = formatDate(new Date());
        const todayTasks = getAllTasksForDate(todayStr);
        const total = todayTasks.length, done = todayTasks.filter(t => t.completed).length, active = total - done;
        const percent = total > 0 ? Math.round((done / total) * 100) : 0;
        let scheduledMinutes = 0;
        todayTasks.forEach(t => { if (t.start && t.end) { const [sh, sm] = t.start.split(':').map(Number); const [eh, em] = t.end.split(':').map(Number); const mins = (eh * 60 + em) - (sh * 60 + sm); if (mins > 0) scheduledMinutes += mins; } });
        const totalHours = Math.floor(scheduledMinutes / 60), totalMins = scheduledMinutes % 60;
        let mood = '😐'; if (percent === 100 && total > 0) mood = '🔥'; else if (percent >= 75) mood = '💪'; else if (percent >= 50) mood = '👍'; else if (total === 0) mood = '✨';

        DOM.todayStats.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><span style="font-size:13px;font-weight:600;">📌 Сегодня</span><span style="font-size:20px;">${mood}</span></div><div style="font-size:12px;color:var(--text-secondary);margin-bottom:10px;">${new Date().getDate()} ${MONTHS_RU_GEN[new Date().getMonth()]} ${new Date().getFullYear()} — ${DAYS_RU[new Date().getDay()]}</div><div class="detail-stats"><div class="detail-stat"><div class="detail-stat-value">${total}</div><div class="detail-stat-label">Всего</div></div><div class="detail-stat"><div class="detail-stat-value">${done}</div><div class="detail-stat-label">Готово</div></div><div class="detail-stat"><div class="detail-stat-value">${active}</div><div class="detail-stat-label">Осталось</div></div><div class="detail-stat highlight"><div class="detail-stat-value">${percent}%</div><div class="detail-stat-label">Прогресс</div></div></div>${totalHours > 0 ? `<div style="margin-top:6px;padding:8px;background:var(--bg-tertiary);border-radius:var(--radius-sm);border:1px solid var(--border);"><div style="font-size:11px;color:var(--text-secondary);">⏱️ Запланировано</div><div style="font-size:15px;font-weight:700;">${totalHours}ч ${totalMins}мин</div></div>` : ''}<div style="margin-top:10px;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">Прогресс</div><div class="progress-bar" style="height:6px;"><div class="progress-fill" style="width:${percent}%"></div></div></div>`;
        DOM.todayTimeSummary.innerHTML = scheduledMinutes > 0 ? `<div style="padding:10px;background:var(--bg-tertiary);border-radius:var(--radius-sm);border:1px solid var(--border);margin-top:8px;"><div style="font-size:11px;color:var(--text-secondary);margin-bottom:4px;">📊 Загрузка дня</div><div class="progress-bar" style="height:6px;"><div class="progress-fill" style="width:${Math.min(100, Math.round((scheduledMinutes / 960) * 100))}%"></div></div><div style="font-size:9px;color:var(--text-muted);margin-top:3px;">из 16ч рабочего дня</div></div>` : '';

        const todayList = DOM.todayTaskList;
        if (todayTasks.length === 0) { todayList.innerHTML = `<div class="empty-state" style="padding:14px;"><div class="empty-state-text">Нет задач на сегодня</div></div>`; DOM.addTaskBtnToday.style.display = 'flex'; }
        else { DOM.addTaskBtnToday.style.display = 'none'; todayTasks.sort((a, b) => { if (a.completed !== b.completed) return a.completed ? 1 : -1; if (a.start && b.start) return a.start.localeCompare(b.start); return 0; });
            todayList.innerHTML = todayTasks.map(task => `<div class="task-item ${task.completed ? 'completed' : ''} priority-${task.priority || 'med'}" data-date="${todayStr}" data-id="${task.id}"><div class="task-checkbox ${task.completed ? 'checked' : ''}"></div><div class="task-content"><div class="task-text">${escapeHtml(task.name)}</div>${task.start ? `<div class="task-time">🕐 ${task.start}${task.end ? ' — '+task.end : ''}</div>` : ''}${task.tags?.length ? `<div class="task-tags">${task.tags.map(t => `<span class="task-tag">${escapeHtml(t)}</span>`).join('')}</div>` : ''}</div><div class="task-actions"><button class="task-action-btn" data-action="edit">✎</button><button class="task-action-btn delete" data-action="delete">✕</button></div></div>`).join('');
        }

    function updateWeekStats() {
        const today = new Date(); const dayOfWeek = today.getDay(); const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
        const monday = new Date(today); monday.setDate(today.getDate() + mondayOffset);
        let weekTotal = 0, weekDone = 0, weekScheduled = 0, dayRows = '';
        for (let i = 0; i < 7; i++) {
            const d = new Date(monday); d.setDate(monday.getDate() + i); const ds = formatDate(d);
            const dayTasks = getAllTasksForDate(ds); const dayDone = dayTasks.filter(t => t.completed).length; const dayTotal = dayTasks.length; const dayPercent = dayTotal > 0 ? Math.round((dayDone / dayTotal) * 100) : 0;
            weekTotal += dayTotal; weekDone += dayDone;
            dayTasks.forEach(t => { if (t.start && t.end) { const [sh, sm] = t.start.split(':').map(Number); const [eh, em] = t.end.split(':').map(Number); const mins = (eh * 60 + em) - (sh * 60 + sm); if (mins > 0) weekScheduled += mins; } });
            const isToday = ds === formatDate(today);
            dayRows += `<div class="week-day-row"><div class="week-day-label" style="${isToday ? 'color:var(--accent);' : ''}">${isToday ? '👉 ' : ''}${DAYS_RU_SHORT[d.getDay()]} ${d.getDate()}</div><div class="week-day-tasks">${dayTotal} зад. · ${dayDone}✓</div><div class="week-day-progress"><div class="week-day-progress-bar"><div class="week-day-progress-fill" style="width:${dayPercent}%"></div></div></div></div>`;
        }
        const weekPercent = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0; const weekHours = Math.floor(weekScheduled / 60); const weekMins = weekScheduled % 60;
        const sunday = new Date(monday); sunday.setDate(monday.getDate() + 6);
        DOM.weekStats.innerHTML = `<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;"><span style="font-size:13px;font-weight:600;">📊 Неделя</span></div><div style="font-size:11px;color:var(--text-secondary);margin-bottom:8px;">${monday.getDate()} ${MONTHS_RU_GEN[monday.getMonth()]} — ${sunday.getDate()} ${MONTHS_RU_GEN[sunday.getMonth()]}</div><div class="detail-stats"><div class="detail-stat"><div class="detail-stat-value">${weekTotal}</div><div class="detail-stat-label">Всего</div></div><div class="detail-stat"><div class="detail-stat-value">${weekDone}</div><div class="detail-stat-label">Готово</div></div><div class="detail-stat"><div class="detail-stat-value">${weekTotal - weekDone}</div><div class="detail-stat-label">Осталось</div></div><div class="detail-stat highlight"><div class="detail-stat-value">${weekPercent}%</div><div class="detail-stat-label">Прогресс</div></div></div>${weekHours > 0 ? `<div style="margin-top:6px;padding:8px;background:var(--bg-tertiary);border-radius:var(--radius-sm);border:1px solid var(--border);"><div style="font-size:11px;color:var(--text-secondary);">⏱️ За неделю</div><div style="font-size:15px;font-weight:700;">${weekHours}ч ${weekMins}мин</div></div>` : ''}<div style="margin-top:8px;"><div style="font-size:10px;color:var(--text-muted);margin-bottom:3px;">Прогресс недели</div><div class="progress-bar" style="height:6px;"><div class="progress-fill" style="width:${weekPercent}%"></div></div></div>`;
        DOM.weekDayBreakdown.innerHTML = `<div style="margin-top:12px;">${dayRows}</div>`;
    }

    function updateStats() {
        let total = 0, active = 0, done = 0; for (const d in tasks) tasks[d].forEach(t => { total++; if (t.completed) done++; else active++; });
        DOM.statTotal.textContent = total; DOM.statActive.textContent = active; DOM.statDone.textContent = done;
        DOM.progressFill.style.width = (total > 0 ? Math.round((done / total) * 100) : 0) + '%';
    }

    function saveCurrentDayAsTemplate() { if (!selectedDate) { showToast('Выберите день', 'error'); return; } const t = getTasksForDate(selectedDate); if (t.length === 0) { showToast('Нет задач', 'warning'); return; } document.getElementById('templateModalOverlay').classList.add('active'); }
    function createTemplate(name, desc, list) { templates[name] = { id: Date.now().toString(36), name, desc, tasks: list.map(t => ({ name: t.name, start: t.start, end: t.end, description: t.description, tags: t.tags, priority: t.priority })), createdAt: new Date().toISOString() }; saveTemplates(); renderTemplates(); showToast('Шаблон сохранён', 'success'); }

    function setupEventListeners() {

        document.getElementById('saveTemplateBtn').addEventListener('click', saveCurrentDayAsTemplate);
        document.getElementById('templateForm').addEventListener('submit', (e) => { e.preventDefault(); const name = document.getElementById('templateName').value.trim(); if (!name || !selectedDate) return; createTemplate(name, document.getElementById('templateDesc').value.trim(), getTasksForDate(selectedDate)); closeModal(); });

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault(); if (!selectedDate) return;
            const name = document.getElementById('taskName').value.trim(), start = document.getElementById('taskStart').value, end = document.getElementById('taskEnd').value, description = document.getElementById('taskDesc').value.trim(), tags = document.getElementById('taskTags').value.split(',').map(t => t.trim()).filter(t => t), priority = document.getElementById('taskPriority').value;
            const dateStart = document.getElementById('taskDateStart').value, dateEnd = document.getElementById('taskDateEnd').value;
            const rD = document.getElementById('repeatDaily').checked, rW = document.getElementById('repeatWeekdays').checked, rWk = document.getElementById('repeatWeekly').checked;
            if (!name) return; let dates = [selectedDate];
            if (dateStart && dateEnd) dates = getDatesInRange(dateStart, dateEnd);
            if (rD || rW || rWk) { const today = new Date(), nm = new Date(currentYear, currentMonth + 1, 0); let range = getDatesInRange(today, nm); if (rW) range = range.filter(d => parseDate(d).getDay() >= 1 && parseDate(d).getDay() <= 5); if (rWk) { const cd = today.getDay(); range = range.filter(d => parseDate(d).getDay() === cd); } dates = [...new Set([...dates, ...range])]; }
            if (editingTaskId) { updateTask(selectedDate, editingTaskId, { name, start, end, description, tags, priority }); showToast('Обновлено', 'success'); } else { addTaskToMultipleDates(dates, { name, start, end, description, tags, priority }); showToast(`На ${dates.length} дн.`, 'success'); }
            closeModal(); renderTaskList(selectedDate); renderCalendar(); updateTodayStats(); updateWeekStats();
        });

        document.getElementById('printBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown('printDropdown'); });
        document.getElementById('dataBtn').addEventListener('click', (e) => { e.stopPropagation(); toggleDropdown('dataDropdown'); });
        document.addEventListener('click', () => document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')));
        document.getElementById('fileInput').addEventListener('change', handleImport); document.getElementById('templateFileInput').addEventListener('change', handleTemplateImport);
        DOM.searchInput.addEventListener('input', (e) => { searchQuery = e.target.value; if (selectedDate) renderTaskList(selectedDate); });
        document.querySelectorAll('.filter-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); currentFilter = btn.dataset.filter; if (selectedDate) renderTaskList(selectedDate); }));
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        // Swipe navigation
        document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; });
        document.addEventListener('touchend', e => {
            const diff = e.changedTouches[0].clientX - touchStartX; const diffY = Math.abs(e.changedTouches[0].clientY - touchStartY);
            if (Math.abs(diff) > 100 && diffY < 50 && !e.target.closest('.task-list, .modal, .modal-overlay')) {
                if (diff > 0) { currentMonth--; if (currentMonth < 0) { currentMonth = 11; currentYear--; } } else { currentMonth++; if (currentMonth > 11) { currentMonth = 0; currentYear++; } } renderCalendar();
            }
        });

        document.querySelectorAll('.btn').forEach(btn => btn.addEventListener('mousemove', (e) => { const rect = btn.getBoundingClientRect(); btn.style.setProperty('--x', ((e.clientX - rect.left) / rect.width * 100) + '%'); btn.style.setProperty('--y', ((e.clientY - rect.top) / rect.height * 100) + '%'); }));
    }

    function switchTab(tabName) {
        document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabName));
        document.querySelectorAll('.mobile-nav-item').forEach(i => i.classList.toggle('active', i.dataset.tab === tabName));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.toggle('active', c.id === 'tab-' + tabName));
        if (tabName === 'today') updateTodayStats();
        if (tabName === 'week') updateWeekStats();
    }

    function showToast(message, type = 'success') { const toast = document.createElement('div'); toast.className = `toast ${type}`; toast.textContent = `${type === 'success' ? '✓' : type === 'error' ? '✕' : '⚠'} ${message}`; DOM.toastContainer.appendChild(toast); setTimeout(() => { toast.classList.add('removing'); setTimeout(() => toast.remove(), 300); }, 3000); }

    // Print functions
    function printView(type) { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); if (type === 'day') printDay(); else if (type === 'week') printWeek(); else printMonth(); }
    function printDay() { const ds = selectedDate || formatDate(new Date()), date = parseDate(ds), dt = getAllTasksForDate(ds); DOM.printArea.innerHTML = `<div class="print-header">📅 ${date.getDate()} ${MONTHS_RU_GEN[date.getMonth()]} ${date.getFullYear()} — ${DAYS_RU[date.getDay()]}</div><div class="print-task-list">${dt.length === 0 ? '<p style="text-align:center;color:#666;padding:20px;">Нет задач</p>' : dt.map(t => `<div class="print-task-item">${t.completed?'☑':'☐'} <strong>${escapeHtml(t.name)}</strong>${t.start?` <span style="color:#666;">(${t.start}—${t.end||'—'})</span>`:''}${t.description?`<br><span style="color:#666;font-size:9pt;">&nbsp;&nbsp;${escapeHtml(t.description)}</span>`:''}</div>`).join('')}</div>`; setTimeout(() => window.print(), 150); }
    function printWeek() { const ref = selectedDate ? parseDate(selectedDate) : new Date(), mo = ref.getDay() === 0 ? -6 : 1 - ref.getDay(); const mon = new Date(ref); mon.setDate(ref.getDate() + mo); let h = `<div class="print-header">📅 ${mon.getDate()} ${MONTHS_RU_GEN[mon.getMonth()]} — `; const sun = new Date(mon); sun.setDate(mon.getDate() + 6); h += `${sun.getDate()} ${MONTHS_RU_GEN[sun.getMonth()]} ${sun.getFullYear()}</div><div class="print-task-list">`; for (let i = 0; i < 7; i++) { const d = new Date(mon); d.setDate(mon.getDate() + i); const ds = formatDate(d); const dt = getAllTasksForDate(ds); h += `<div style="margin:12px 0 4px;border-bottom:2px solid #000;padding-bottom:4px;"><strong>${DAYS_RU_SHORT[d.getDay()]}, ${d.getDate()}</strong></div>`; if (!dt.length) h += '<div style="color:#aaa;padding:3px 0;font-size:9pt;">Нет</div>'; else dt.forEach(t => { h += `<div class="print-task-item">${t.completed?'☑':'☐'} ${escapeHtml(t.name)}${t.start?` (${t.start}—${t.end||'—'})`:''}</div>`; }); } h += '</div>'; DOM.printArea.innerHTML = h; setTimeout(() => window.print(), 150); }
    function printMonth() { DOM.printArea.innerHTML = `<div class="print-header">📅 ${MONTHS_RU[currentMonth]} ${currentYear}</div><div class="print-task-list"><p style="text-align:center;color:#666;">Печать месяца</p></div>`; setTimeout(() => window.print(), 150); }
    function printDailyCard(ds) { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); const dateStr = ds || selectedDate || formatDate(new Date()); const date = parseDate(dateStr); const dt = getAllTasksForDate(dateStr); dt.sort((a, b) => { if (a.completed !== b.completed) return a.completed ? 1 : -1; if (a.start && b.start) return a.start.localeCompare(b.start); return 0; }); DOM.printArea.innerHTML = `<div class="print-card"><div class="print-card-header"><div class="print-card-date">${date.getDate()} ${MONTHS_RU_GEN[date.getMonth()]} ${date.getFullYear()}</div><div class="print-card-day">${DAYS_RU[date.getDay()]}</div></div><div class="print-card-body">${dt.length === 0 ? '<p style="text-align:center;color:#999;padding:20px;font-size:9pt;">Нет задач</p>' : dt.map(t => `<div class="print-card-task"><span class="print-card-check ${t.completed?'done':''}"></span><span class="print-card-task-text">${escapeHtml(t.name)}</span>${t.start?`<span class="print-card-task-time">${t.start}${t.end?'–'+t.end:''}</span>`:''}</div>`).join('')}</div><div class="print-card-footer">${dt.length > 0 ? `Задач: ${dt.length} · Готово: ${dt.filter(t=>t.completed).length}` : '✦ Планировщик ✦'}</div></div>`; setTimeout(() => window.print(), 150); }
    function printMultiCards() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); const today = new Date(); let html = '<div style="display:flex;flex-wrap:wrap;justify-content:center;gap:5px;padding:10mm;">'; for (let i = 0; i < 4; i++) { const d = new Date(today); d.setDate(today.getDate() + i); const ds = formatDate(d); const date = parseDate(ds); const dt = getAllTasksForDate(ds); dt.sort((a, b) => { if (a.completed !== b.completed) return a.completed ? 1 : -1; return 0; }); html += `<div class="print-card"><div class="print-card-header"><div class="print-card-date">${d.getDate()} ${MONTHS_RU_GEN[d.getMonth()]}</div><div class="print-card-day">${DAYS_RU_SHORT[d.getDay()]}</div></div><div class="print-card-body">${dt.length === 0 ? '<p style="text-align:center;color:#999;padding:10px;font-size:8pt;">Нет задач</p>' : dt.slice(0,6).map(t => `<div class="print-card-task"><span class="print-card-check ${t.completed?'done':''}"></span><span class="print-card-task-text">${escapeHtml(t.name)}</span>${t.start?`<span class="print-card-task-time">${t.start}</span>`:''}</div>`).join('')}</div></div>`; } html += '</div>'; DOM.printArea.innerHTML = html; setTimeout(() => window.print(), 150); }

    function exportJSON() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); downloadJSON({ tasks, templates, exportedAt: new Date().toISOString(), version: '2.0' }, `planner_${formatDate(new Date())}.json`); showToast('Экспортировано', 'success'); }
    function exportTemplates() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); downloadJSON(templates, `templates_${formatDate(new Date())}.json`); showToast('Шаблоны экспортированы', 'success'); }
    function downloadJSON(data, filename) { const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' }); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; a.click(); }
    function handleImport(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const imp = JSON.parse(ev.target.result); if (!imp.tasks && !Array.isArray(imp)) throw new Error('Invalid'); const data = imp.tasks ? imp : { tasks: imp, templates: {} }; if (confirm('OK — заменить\nОтмена — объединить')) { tasks = data.tasks || {}; templates = data.templates || {}; } else { for (const d in data.tasks) { if (!tasks[d]) tasks[d] = []; const ids = new Set(tasks[d].map(t => t.id)); data.tasks[d].forEach(t => { if (!ids.has(t.id)) tasks[d].push(t); }); } for (const n in data.templates) if (!templates[n]) templates[n] = data.templates[n]; } saveTasks(); saveTemplates(); renderCalendar(); if (selectedDate) renderTaskList(selectedDate); renderTemplates(); updateTodayStats(); updateWeekStats(); showToast('Импортировано', 'success'); } catch { showToast('Ошибка формата', 'error'); } }; reader.readAsText(file); e.target.value = ''; }
    function handleTemplateImport(e) { const file = e.target.files[0]; if (!file) return; const reader = new FileReader(); reader.onload = (ev) => { try { const imp = JSON.parse(ev.target.result); for (const n in imp) templates[n] = imp[n]; saveTemplates(); renderTemplates(); showToast('Импортировано', 'success'); } catch { showToast('Ошибка', 'error'); } }; reader.readAsText(file); e.target.value = ''; }
    function clearAllData() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('active')); if (confirm('⚠️ Удалить ВСЕ данные?')) { tasks = {}; templates = {}; saveTasks(); saveTemplates(); renderCalendar(); if (selectedDate) renderTaskList(selectedDate); renderTemplates(); updateTodayStats(); updateWeekStats(); showToast('Очищено', 'success'); } }

    window.addEventListener('beforeprint', () => { if (!DOM.printArea.innerHTML.trim()) printDailyCard(); });
    init();
</script>
</body>
</html>
